<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LES SOUL - Store Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-inner">
                <div class="logo-area">
                    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="store-name">LES SOUL</h1>
                    <span class="store-subtitle">Store Management</span>
                </div>
                <div class="header-right">
                    <div class="lang-selector">
                        <button class="lang-btn active" data-lang="ko" onclick="setLanguage('ko'); App.render();" title="한국어">🇰🇷</button>
                        <button class="lang-btn" data-lang="zh" onclick="setLanguage('zh'); App.render();" title="中文">🇨🇳</button>
                        <button class="lang-btn" data-lang="en" onclick="setLanguage('en'); App.render();" title="English">🇺🇸</button>
                        <button class="lang-btn" data-lang="ja" onclick="setLanguage('ja'); App.render();" title="日本語">🇯🇵</button>
                    </div>
                </div>
            </div>
        </header>

        <nav class="sidebar" id="sidebar">
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#/dashboard" class="nav-link" data-page="dashboard">
                        <i class="fas fa-tachometer-alt"></i>
                        <span class="nav-text" data-i18n-section="nav" data-i18n-key="dashboard">대시보드</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#/products" class="nav-link" data-page="products">
                        <i class="fas fa-tshirt"></i>
                        <span class="nav-text" data-i18n-section="nav" data-i18n-key="products">상품</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#/inventory" class="nav-link" data-page="inventory">
                        <i class="fas fa-boxes"></i>
                        <span class="nav-text" data-i18n-section="nav" data-i18n-key="inventory">재고</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#/orders" class="nav-link" data-page="orders">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="nav-text" data-i18n-section="nav" data-i18n-key="orders">판매</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#/customers" class="nav-link" data-page="customers">
                        <i class="fas fa-users"></i>
                        <span class="nav-text" data-i18n-section="nav" data-i18n-key="customers">고객</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#/analytics" class="nav-link" data-page="analytics">
                        <i class="fas fa-chart-line"></i>
                        <span class="nav-text" data-i18n-section="nav" data-i18n-key="analytics">수익분석</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#/expenses" class="nav-link" data-page="expenses">
                        <i class="fas fa-receipt"></i>
                        <span class="nav-text" data-i18n-section="nav" data-i18n-key="expenses">경비관리</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#/classification" class="nav-link" data-page="classification">
                        <i class="fas fa-tags"></i>
                        <span class="nav-text" data-i18n-section="nav" data-i18n-key="classification">분류키워드</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#/excel" class="nav-link" data-page="excel">
                        <i class="fas fa-file-excel"></i>
                        <span class="nav-text" data-i18n-section="nav" data-i18n-key="excel">Excel 관리</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#/settings" class="nav-link" data-page="settings">
                        <i class="fas fa-cog"></i>
                        <span class="nav-text" data-i18n-section="nav" data-i18n-key="settings">설정</span>
                    </a>
                </li>
            </ul>
        </nav>

        <main class="main-content" id="main-content">
            <div id="flash-messages"></div>
            <div id="page-content"></div>
        </main>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/db.js"></script>
    <script src="js/price-calculator.js"></script>
    <script src="js/classification.js"></script>
    <script src="js/products.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/customers.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/expenses.js"></script>
    <script src="js/excel.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
